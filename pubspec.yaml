name: style_haven
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.11.4


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  gap: ^3.0.1
  ionicons: ^0.2.2
  flutter_credit_card: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_assets:
  assets_path: assets/
  output_path: lib/core/constants
  filename: constants_assets.dart

flutter:
  uses-material-design: true
  assets:
    - assets/cover/
    - assets/logo/
    - assets/pop/
    - assets/product/
    - assets/svgs/
    - assets/texts/
   

  fonts:
    - family: "Tener Sans"
      fonts:
        - asset: assets/fonts/Tenor_Sans/TenorSans-Regular.ttf
     
